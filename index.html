<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyStore</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h2>🛒 MyStore</h2>
  <a href="cart.html">Cart</a>
</nav>

<header>
  <h1>Welcome to MyStore</h1>
  <p>Best products with best prices</p>
</header>

<section class="products">

  <div class="card">
    <h3>Headphones</h3>
    <p>Price: 500 EGP</p>
    <button type="button" onclick="addToCart('Headphones',500)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Smart Watch</h3>
    <p>Price: 800 EGP</p>
    <button type="button" onclick="addToCart('Smart Watch',800)">Add to Cart</button>
  </div>

  <div class="card">
    <h3>Keyboard</h3>
    <p>Price: 300 EGP</p>
    <button type="button" onclick="addToCart('Keyboard',300)">Add to Cart</button>
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
